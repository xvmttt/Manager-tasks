<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks</title>
    <link rel="stylesheet" href="style_tasks.css">
</head>
<body class ='tasks'>
    <section id = "personal_tasks">
        <header>
            <div class = 'task'>
                <h1>Список задач:</h1>
                <div class = 'btn_menu  '>
                    <button id = "logoutbtn" class ='logout_btn'>Выйти</button>
                    <button id = 'task-btn' class="btn">Добавить задачу</button>
                </div>
            </div>
        </header>
        <h3 class="all-task">Все задачи</h3>
        <div id="tasks-list"></div>
            <div class = 'newtask' id="newtask">
                <div class="newtask-content">
                    <input id="input-task" placeholder="Введите задачу">
                    <input id="input-data" placeholder="Введите дедлайн">
                    <button id="addbtn">Добавить задачу</button>
                </div>
        </div>
    </section>
    <script src="script.js"></script>
    
</body>
</html>
